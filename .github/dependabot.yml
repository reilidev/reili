version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/crates"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 20
    groups:
      rust-deps:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/.github/workflows"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
