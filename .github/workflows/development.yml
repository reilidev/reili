name: Development

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
    paths:
      - "crates/**"

env:
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  CARGO_HTTP_TIMEOUT: 60
  CARGO_INCREMENTAL: 0
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  CARGO_TERM_COLOR: always
  BIN_NAME: reili

jobs:
  lint:
    permissions:
      contents: read
    runs-on: ubuntu-slim
    defaults:
      run:
        working-directory: crates
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # release tag v1; upstream does not publish v1.x.y tags
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: crates -> target

      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    permissions:
      contents: read
    runs-on: ubuntu-slim
    defaults:
      run:
        working-directory: crates
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # release tag v1; upstream does not publish v1.x.y tags
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: crates -> target

      - run: cargo test --workspace --locked --all-targets

  build-release-bundle:
    if: github.event_name == 'pull_request' && startsWith(github.event.pull_request.head.ref, 'release-plz-')
    needs:
      - lint
      - test
    permissions:
      contents: read
    uses: ./.github/workflows/_build-release-bundle.yml
    with:
      arch: amd64
      runner: ubuntu-latest
      target: x86_64-unknown-linux-musl
      version: development

  container-image:
    if: github.event_name == 'pull_request' && startsWith(github.event.pull_request.head.ref, 'release-plz-')
    needs: build-release-bundle
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: release-bundle-amd64
          path: dist/release

      - name: Prepare Docker build context
        run: |
          target="x86_64-unknown-linux-musl"
          package_name="reili-development-${target}"

          mkdir -p dist/docker/amd64
          tar -xzf "dist/release/${package_name}.tar.gz" -C dist/release
          install -m 755 \
            "dist/release/${package_name}/${BIN_NAME}" \
            "dist/docker/amd64/${BIN_NAME}"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          build-args: |
            APP_VERSION=development
          tags: reili:development
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container entrypoint
        run: |
          set +e
          output="$(docker run --rm reili:development 2>&1)"
          status=$?
          set -e

          printf '%s\n' "${output}"

          test "${status}" -ne 0
          printf '%s\n' "${output}" | grep -F "Missing required environment variable: SLACK_BOT_TOKEN"
