name: Release

on:
  push:
    branches:
      - main

env:
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  CARGO_HTTP_TIMEOUT: 60
  CARGO_INCREMENTAL: 0
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  CARGO_TERM_COLOR: always
  BIN_NAME: reili

jobs:
  tagpr:
    permissions:
      contents: write
      pull-requests: write
      issues: read
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    outputs:
      tag_name: ${{ steps.tagpr.outputs.tag }}
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.REILI_BOT_APP_ID }}
          private-key: ${{ secrets.REILI_BOT_APP_PRIVATE_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # release tag v1; upstream does not publish v1.x.y tags
        with:
          toolchain: stable

      - id: tagpr
        uses: Songmu/tagpr@e84001bd5dac8defa0c75b3913937d284a3b3660 # v1.20.0
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  release-metadata:
    needs: tagpr
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.parse.outputs.tag_name }}
      version: ${{ steps.parse.outputs.version }}
      major: ${{ steps.parse.outputs.major }}
      minor: ${{ steps.parse.outputs.minor }}
    steps:
      - id: parse
        env:
          TAG_NAME: ${{ needs.tagpr.outputs.tag_name }}
        run: |
          if [ -z "${TAG_NAME}" ]; then
            {
              echo "tag_name="
              echo "version="
              echo "major="
              echo "minor="
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          version="${TAG_NAME#v}"
          major="${version%%.*}"
          minor="${version#*.}"
          minor="${minor%%.*}"

          {
            echo "tag_name=${TAG_NAME}"
            echo "version=${version}"
            echo "major=${major}"
            echo "minor=${minor}"
          } >> "${GITHUB_OUTPUT}"

  build-binaries:
    needs: release-metadata
    if: needs.release-metadata.outputs.tag_name != ''
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
          - arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
    uses: ./.github/workflows/_build-release-bundle.yml
    with:
      arch: ${{ matrix.arch }}
      runner: ${{ matrix.runner }}
      target: ${{ matrix.target }}
      version: ${{ needs.release-metadata.outputs.tag_name }}

  github-release:
    needs:
      - build-binaries
      - release-metadata
    if: needs.release-metadata.outputs.tag_name != ''
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.REILI_BOT_APP_ID }}
          private-key: ${{ secrets.REILI_BOT_APP_PRIVATE_KEY }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: release-bundle-*
          merge-multiple: true
          path: dist

      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh release upload "${{ needs.release-metadata.outputs.tag_name }}" \
            dist/*.tar.gz \
            dist/*.sha256 \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

  container-image:
    needs:
      - github-release
      - release-metadata
    if: needs.release-metadata.outputs.tag_name != ''
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.REILI_BOT_APP_ID }}
          private-key: ${{ secrets.REILI_BOT_APP_PRIVATE_KEY }}

      - name: Download release assets
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          mkdir -p dist/release

          gh release download "${{ needs.release-metadata.outputs.tag_name }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "reili-${{ needs.release-metadata.outputs.tag_name }}-*.tar.gz" \
            --dir dist/release

      - name: Prepare Docker build context
        run: |
          mkdir -p dist/docker/amd64 dist/docker/arm64

          for target in x86_64-unknown-linux-musl aarch64-unknown-linux-musl; do
            case "${target}" in
              x86_64-unknown-linux-musl) arch=amd64 ;;
              aarch64-unknown-linux-musl) arch=arm64 ;;
            esac

            package="reili-${{ needs.release-metadata.outputs.tag_name }}-${target}"

            tar -xzf "dist/release/${package}.tar.gz" -C dist/release
            install -m 755 \
              "dist/release/${package}/${BIN_NAME}" \
              "dist/docker/${arch}/${BIN_NAME}"
          done

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ needs.release-metadata.outputs.version }}
            type=raw,value=${{ needs.release-metadata.outputs.major }}.${{ needs.release-metadata.outputs.minor }}
            type=raw,value=latest,enable=${{ !contains(needs.release-metadata.outputs.version, '-') }}
            type=sha

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            APP_VERSION=${{ needs.release-metadata.outputs.tag_name }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-pages:
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    env:
      PAGES_ARTIFACT_NAME: github-pages-${{ github.run_attempt }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          name: ${{ env.PAGES_ARTIFACT_NAME }}
          path: pages

      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
        with:
          artifact_name: ${{ env.PAGES_ARTIFACT_NAME }}
