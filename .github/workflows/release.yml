name: Release

on:
  push:
    branches:
      - main

env:
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  CARGO_HTTP_TIMEOUT: 60
  CARGO_INCREMENTAL: 0
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  CARGO_TERM_COLOR: always
  BIN_NAME: reili

jobs:
  release:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    outputs:
      release_created: ${{ steps.release.outputs['crates--release_created'] }}
      tag_name: ${{ steps.release.outputs['crates--tag_name'] }}
      version: ${{ steps.release.outputs['crates--version'] }}
      major: ${{ steps.release.outputs['crates--major'] }}
      minor: ${{ steps.release.outputs['crates--minor'] }}
    steps:
      - uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: app-token
        with:
          app-id: ${{ vars.REILI_BOT_APP_ID }}
          private-key: ${{ secrets.REILI_BOT_APP_PRIVATE_KEY }}

      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-binaries:
    needs: release
    if: needs.release.outputs.release_created == 'true'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
          - arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
    uses: ./.github/workflows/_build-release-bundle.yml
    with:
      arch: ${{ matrix.arch }}
      runner: ${{ matrix.runner }}
      target: ${{ matrix.target }}
      version: ${{ needs.release.outputs.tag_name }}

  github-release:
    needs:
      - build-binaries
      - release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: app-token
        with:
          app-id: ${{ vars.REILI_BOT_APP_ID }}
          private-key: ${{ secrets.REILI_BOT_APP_PRIVATE_KEY }}

      - uses: actions/download-artifact@v8
        with:
          pattern: release-bundle-*
          merge-multiple: true
          path: dist

      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh release upload "${{ needs.release.outputs.tag_name }}" \
            dist/*.tar.gz \
            dist/*.sha256 \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

  container-image:
    needs:
      - github-release
      - release
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: app-token
        with:
          app-id: ${{ vars.REILI_BOT_APP_ID }}
          private-key: ${{ secrets.REILI_BOT_APP_PRIVATE_KEY }}

      - name: Download release assets
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          mkdir -p dist/release

          gh release download "${{ needs.release.outputs.tag_name }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "reili-${{ needs.release.outputs.tag_name }}-*.tar.gz" \
            --dir dist/release

      - name: Prepare Docker build context
        run: |
          mkdir -p dist/docker/amd64 dist/docker/arm64

          for target in x86_64-unknown-linux-musl aarch64-unknown-linux-musl; do
            case "${target}" in
              x86_64-unknown-linux-musl) arch=amd64 ;;
              aarch64-unknown-linux-musl) arch=arm64 ;;
            esac

            package="reili-${{ needs.release.outputs.tag_name }}-${target}"

            tar -xzf "dist/release/${package}.tar.gz" -C dist/release
            install -m 755 \
              "dist/release/${package}/${BIN_NAME}" \
              "dist/docker/${arch}/${BIN_NAME}"
          done

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ needs.release.outputs.version }}
            type=raw,value=${{ needs.release.outputs.major }}.${{ needs.release.outputs.minor }}
            type=raw,value=latest,enable=${{ !contains(needs.release.outputs.version, '-') }}
            type=sha

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            APP_VERSION=${{ needs.release.outputs.tag_name }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
