name: Release

on:
  push:
    branches:
      - main

env:
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  CARGO_HTTP_TIMEOUT: 60
  CARGO_INCREMENTAL: 0
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  CARGO_TERM_COLOR: always
  BIN_NAME: reili
  RELEASE_PLZ_VERSION: 0.3.157

jobs:
  release-pr:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: app-token
        with:
          app-id: ${{ vars.REILI_BOT_APP_ID }}
          private-key: ${{ secrets.REILI_BOT_APP_PRIVATE_KEY }}

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # release tag v1; upstream does not publish v1.x.y tags
        with:
          toolchain: stable

      - id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
          config: crates/release-plz.toml
          manifest_path: crates/Cargo.toml
          version: ${{ env.RELEASE_PLZ_VERSION }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  release:
    needs: release-pr
    permissions:
      contents: write
      pull-requests: read
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release-plz.outputs.releases_created }}
      releases: ${{ steps.release-plz.outputs.releases }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: app-token
        with:
          app-id: ${{ vars.REILI_BOT_APP_ID }}
          private-key: ${{ secrets.REILI_BOT_APP_PRIVATE_KEY }}

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # release tag v1; upstream does not publish v1.x.y tags
        with:
          toolchain: stable

      - id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
          config: crates/release-plz.toml
          manifest_path: crates/Cargo.toml
          version: ${{ env.RELEASE_PLZ_VERSION }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  prepare-release:
    needs: release
    if: needs.release.outputs.releases_created == 'true'
    permissions: {}
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.metadata.outputs.tag_name }}
      version: ${{ steps.metadata.outputs.version }}
      major: ${{ steps.metadata.outputs.major }}
      minor: ${{ steps.metadata.outputs.minor }}
    steps:
      - id: metadata
        name: Resolve release metadata
        env:
          RELEASES: ${{ needs.release.outputs.releases }}
        run: |
          set -euo pipefail

          runtime_release="$(echo "${RELEASES}" | jq -e -c '.[] | select(.package_name == "reili_runtime")')"
          tag_name="$(echo "${runtime_release}" | jq -r '.tag')"
          version="$(echo "${runtime_release}" | jq -r '.version')"
          major="${version%%.*}"
          rest="${version#*.}"
          minor="${rest%%.*}"

          {
            echo "tag_name=${tag_name}"
            echo "version=${version}"
            echo "major=${major}"
            echo "minor=${minor}"
          } >> "${GITHUB_OUTPUT}"

  build-binaries:
    needs: prepare-release
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
          - arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
    uses: ./.github/workflows/_build-release-bundle.yml
    with:
      arch: ${{ matrix.arch }}
      runner: ${{ matrix.runner }}
      target: ${{ matrix.target }}
      version: ${{ needs.prepare-release.outputs.tag_name }}

  github-release:
    needs:
      - build-binaries
      - prepare-release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: app-token
        with:
          app-id: ${{ vars.REILI_BOT_APP_ID }}
          private-key: ${{ secrets.REILI_BOT_APP_PRIVATE_KEY }}

      - uses: actions/download-artifact@v8
        with:
          pattern: release-bundle-*
          merge-multiple: true
          path: dist

      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh release upload "${{ needs.prepare-release.outputs.tag_name }}" \
            dist/*.tar.gz \
            dist/*.sha256 \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

  container-image:
    needs:
      - github-release
      - prepare-release
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: app-token
        with:
          app-id: ${{ vars.REILI_BOT_APP_ID }}
          private-key: ${{ secrets.REILI_BOT_APP_PRIVATE_KEY }}

      - name: Download release assets
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          mkdir -p dist/release

          gh release download "${{ needs.prepare-release.outputs.tag_name }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "reili-${{ needs.prepare-release.outputs.tag_name }}-*.tar.gz" \
            --dir dist/release

      - name: Prepare Docker build context
        run: |
          mkdir -p dist/docker/amd64 dist/docker/arm64

          for target in x86_64-unknown-linux-musl aarch64-unknown-linux-musl; do
            case "${target}" in
              x86_64-unknown-linux-musl) arch=amd64 ;;
              aarch64-unknown-linux-musl) arch=arm64 ;;
            esac

            package="reili-${{ needs.prepare-release.outputs.tag_name }}-${target}"

            tar -xzf "dist/release/${package}.tar.gz" -C dist/release
            install -m 755 \
              "dist/release/${package}/${BIN_NAME}" \
              "dist/docker/${arch}/${BIN_NAME}"
          done

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ needs.prepare-release.outputs.version }}
            type=raw,value=${{ needs.prepare-release.outputs.major }}.${{ needs.prepare-release.outputs.minor }}
            type=raw,value=latest,enable=${{ !contains(needs.prepare-release.outputs.version, '-') }}
            type=sha

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            APP_VERSION=${{ needs.prepare-release.outputs.tag_name }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
