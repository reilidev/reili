# Required: config schema version.
version = 1

# Optional: HTTP server settings.
[server]
# Optional: port Reili listens on in HTTP mode. Defaults to 3000 when omitted.
port = 3000

# Reili conversation settings.
[conversation]
# Optional: default language used in Reili responses. Defaults to `English`.
language = "English"
# Optional: appended verbatim to every agent system prompt after the built-in instructions.
# Useful for team-specific response rules, runbook preferences, or escalation guidance.
additional_system_prompt = ""

# Required: Slack channel integration settings.
[channel.slack]
# Optional: `true` uses Socket Mode, `false` uses HTTP endpoints. Defaults to `true`.
socket_mode = true

[channel.slack.auth]
# Optional: env var name for the Slack bot token. Defaults to `SLACK_BOT_TOKEN`.
bot_token_env = "SLACK_BOT_TOKEN"

[channel.slack.socket]
# Optional when `channel.slack.socket_mode = true`: env var name for the Slack App-Level Token.
# Defaults to `SLACK_APP_TOKEN`.
app_token_env = "SLACK_APP_TOKEN"

[channel.slack.http]
# Optional when `channel.slack.socket_mode = false`: env var name for the Slack signing secret.
# Defaults to `SLACK_SIGNING_SECRET`.
signing_secret_env = "SLACK_SIGNING_SECRET"

# Optional: restrict which `app_mention` events Reili is allowed to handle.
# When omitted, all app mentions visible to the Slack app are handled.
#[channel.slack.authorization.channels]
# Required when `channel.slack.authorization` is configured: Slack channel name allowlist.
# `*` matches zero or more characters. Set `names = []` to allow no channels.
#names = ["alerts-prod", "*-prod", "alerts-*"]

#[channel.slack.authorization.actors]
# Optional: Slack user ID allowlist.
# Omit this list to leave direct user IDs unset. Set `user_ids = []` to allow no direct users.
#user_ids = ["U01234567", "W01234567"]
# Optional: Slack user group ID allowlist.
# Omit this list to leave user groups unset. Set `user_group_ids = []` to allow no user groups.
#user_group_ids = ["S01234567", "S07654321"]
# Optional: allow all Slack bot actors.
#allow_bot = true

# Required: AI backend selection.
[ai]
# Required: backend ID Reili uses for task execution.
default_backend = "primary"

# "primary" is an arbitrary backend ID chosen by the config author.
[ai.backends.primary]
# Required: AI provider for this backend.
provider = "openai"
# Required: model Reili uses for this backend.
model = "gpt-5.4"
# Optional for OpenAI backends: env var name for the API key. Defaults to `LLM_OPENAI_API_KEY`.
api_key_env = "LLM_OPENAI_API_KEY"
# Optional for OpenAI backends: reasoning effort level (`low`, `medium`, `high`, or `xhigh`). Defaults to `medium`.
# reasoning_effort = "medium"

#[ai.backends.anthropic]
#provider = "anthropic"
#model = "claude-haiku-4-5"
# Optional for Anthropic backends: env var name for the API key. Defaults to `LLM_ANTHROPIC_API_KEY`.
#api_key_env = "LLM_ANTHROPIC_API_KEY"

#[ai.backends.bedrock]
#provider = "bedrock"
#model_id = "anthropic.claude-3-7-sonnet-20250219-v1:0"
# aws_profile = "your-aws-profile"
# aws_region = "ap-northeast-1"

#[ai.backends.vertex]
#provider = "vertexai"
#project_id = "your-gcp-project"
#location = "global"
#model_id = "gemini-2.5-flash"

# Reili integrations that require credentials or access to external services.
[connector.datadog]
# Optional: Datadog site for API access. Defaults to `datadoghq.com`.
site = "datadoghq.com"
# Optional: env var name for the Datadog API key. Defaults to `DATADOG_API_KEY`.
api_key_env = "DATADOG_API_KEY"
# Optional: env var name for the Datadog application key. Defaults to `DATADOG_APP_KEY`.
app_key_env = "DATADOG_APP_KEY"

[connector.github]
# Optional: GitHub MCP endpoint URL. Defaults to `https://api.githubcopilot.com/mcp/`.
mcp_url = "https://api.githubcopilot.com/mcp/"
# Required: GitHub organization scope Reili searches within.
search_scope_org = "example-org"

# GitHub App settings used so Reili can authenticate via GitHub App.
[connector.github.app]
# Required: GitHub App ID.
app_id = "123456"
# Required: GitHub App installation ID.
installation_id = "12345678"
# Optional: env var name for the GitHub App private key. Defaults to `GITHUB_APP_PRIVATE_KEY`.
private_key_env = "GITHUB_APP_PRIVATE_KEY"
