# Required: config schema version.
version = 1

# Optional: HTTP server settings.
[server]
# Optional: port Reili listens on in HTTP mode. Defaults to 3000 when omitted.
port = 3000

# Reili conversation settings.
[conversation]
# Optional: default language used in Reili responses. Defaults to `English`.
language = "English"
# Optional: appended verbatim to every agent system prompt after the built-in instructions.
# Useful for team-specific response rules, runbook preferences, or escalation guidance.
additional_system_prompt = ""

# Required: Slack channel integration settings.
[channel.slack]
# Optional: `true` uses Socket Mode, `false` uses HTTP endpoints. Defaults to `true`.
socket_mode = true

[channel.slack.auth]
# Optional: env var name for the Slack bot token. Defaults to `SLACK_BOT_TOKEN`.
bot_token_env = "SLACK_BOT_TOKEN"

[channel.slack.socket]
# Optional when `channel.slack.socket_mode = true`: env var name for the Slack App-Level Token.
# Defaults to `SLACK_APP_TOKEN`.
app_token_env = "SLACK_APP_TOKEN"

[channel.slack.http]
# Optional when `channel.slack.socket_mode = false`: env var name for the Slack signing secret.
# Defaults to `SLACK_SIGNING_SECRET`.
signing_secret_env = "SLACK_SIGNING_SECRET"

#[channel.slack.authorization.actors]
# Optional actor authorization. Applies to both mention responses and auto-responses.
# Optional: Slack user ID allowlist.
# Omit this list to leave direct user IDs unset. Set `user_ids = []` to allow no direct users.
#user_ids = ["U01234567", "W01234567"]
# Optional: Slack user group ID allowlist.
# Omit this list to leave user groups unset. Set `user_group_ids = []` to allow no user groups.
#user_group_ids = ["S01234567", "S07654321"]
# Optional: allow all Slack bot actors. Set true when alert bots should trigger auto-responses.
#allow_bot = true

# Channel opt-in table. Reili answers mentions ONLY in channels matching a `mention = true`
# entry below; without any entry, Reili ignores all mentions. `*` matches zero or more characters.
# Set `auto_response = true` to let Reili watch posts in matching channels and start an
# investigation when its judge LLM decides the post matches the judge policy.
# Auto-response requires the `message.channels` bot event and the bot invited to the channel.
#[[channel.slack.channels]]
#names = ["incidents", "alerts-*"]

# Optional: respond to mentions in these channels. Defaults to true.
#mention = true

# Optional: judge posts in these channels and respond without a mention. Defaults to false.
#auto_response = true

# Optional: judge policy for these channels. When omitted, a built-in policy is used that
# reacts to production issue signals and ignores casual chatter and resolved reports.
#auto_response_policy = "React to production incident signals. Ignore casual chatter and resolved reports."

# Mention-only example:
#[[channel.slack.channels]]
#names = ["team-sre", "oncall-*"]

# Required: AI backend selection.
[ai]
# Required: backend ID Reili uses for task execution. Also the fallback for the
# lead and sub-agent roles below when they are not set explicitly.
default_backend = "primary"

# Optional: backend ID for the lead agent (task runner). Defaults to `default_backend`.
# lead_backend = "primary"

# Optional: backend ID for sub-agents. Defaults to `default_backend`. Must use the
# same provider as the lead backend; only the model differs between the two roles.
# sub_agent_backend = "fast"

# Optional: backend ID for the auto-response judge. Defaults to `default_backend`.
# A cheap, fast model is recommended; it may use a different provider than the lead backend.
# judge_backend = "fast"

# "primary" is an arbitrary backend ID chosen by the config author.
[ai.backends.primary]
# Required: AI provider for this backend.
provider = "openai"
# Required: model Reili uses for this backend.
model = "gpt-5.4"
# Optional for OpenAI backends: env var name for the API key. Defaults to `LLM_OPENAI_API_KEY`.
api_key_env = "LLM_OPENAI_API_KEY"
# Optional for OpenAI backends: reasoning effort level (`low`, `medium`, `high`, or `xhigh`). Defaults to `medium`.
# reasoning_effort = "medium"

# Optional sibling backend for a cheaper sub-agent model. Reference it from
# `sub_agent_backend` above to run sub-agents on a smaller model than the lead.
# It must use the same provider as the lead backend.
#[ai.backends.fast]
#provider = "openai"
#model = "gpt-5.4-mini"

#[ai.backends.anthropic]
#provider = "anthropic"
#model = "claude-haiku-4-5"
# Optional for Anthropic backends: env var name for the API key. Defaults to `LLM_ANTHROPIC_API_KEY`.
#api_key_env = "LLM_ANTHROPIC_API_KEY"

#[ai.backends.bedrock]
#provider = "bedrock"
#model_id = "anthropic.claude-3-7-sonnet-20250219-v1:0"
# aws_profile = "your-aws-profile"
# aws_region = "ap-northeast-1"

#[ai.backends.vertex]
#provider = "vertexai"
#project_id = "your-gcp-project"
#location = "global"
#model_id = "gemini-2.5-flash"

# Reili integrations that require credentials or access to external services.
[connector.datadog]
# Optional: Datadog site for API access. Defaults to `datadoghq.com`.
site = "datadoghq.com"
# Optional: env var name for the Datadog API key. Defaults to `DATADOG_API_KEY`.
api_key_env = "DATADOG_API_KEY"
# Optional: env var name for the Datadog application key. Defaults to `DATADOG_APP_KEY`.
app_key_env = "DATADOG_APP_KEY"

[connector.github]
# Optional: GitHub MCP endpoint URL. Defaults to `https://api.githubcopilot.com/mcp/`.
mcp_url = "https://api.githubcopilot.com/mcp/"
# Required: GitHub organization scope Reili searches within.
search_scope_org = "example-org"

# GitHub App settings used so Reili can authenticate via GitHub App.
[connector.github.app]
# Required: GitHub App ID.
app_id = "123456"
# Required: GitHub App installation ID.
installation_id = "12345678"
# Optional: env var name for the GitHub App private key. Defaults to `GITHUB_APP_PRIVATE_KEY`.
private_key_env = "GITHUB_APP_PRIVATE_KEY"

# Optional: esa knowledge base search. Omit this section to disable the `esa_agent` sub-agent and its tools.
#[connector.esa]
# Required when configured: esa team name, e.g. `docs` for https://docs.esa.io/.
#team_name = "docs"
# Optional when configured: env var name for an esa access token with the `read` scope.
# Defaults to `ESA_ACCESS_TOKEN`.
#access_token_env = "ESA_ACCESS_TOKEN"

# Optional: JIRA ticket search and reference via the Atlassian Rovo MCP server. Omit this section
# to disable the JIRA sub-agent and its tools. Requires an org admin to enable "Authentication via
# API token" for the Rovo MCP server and to issue a service account API token.
#[connector.jira]
# Required when configured: Atlassian Cloud site hostname, e.g. `acme.atlassian.net`.
#site = "acme.atlassian.net"
# Optional when configured: env var name for the Rovo MCP service account API token. Defaults to
# `JIRA_SERVICE_ACCOUNT_API_TOKEN`.
#service_account_api_token_env = "JIRA_SERVICE_ACCOUNT_API_TOKEN"
